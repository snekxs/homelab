controllers:
  jellyfin:
    containers:
      app:
        image:
          repository: jellyfin/jellyfin
          tag: latest
        env:
          JELLYFIN_PublishedServerUrl: "https://jellyfin.snekxs.xyz"
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 4000m
            memory: 4Gi

service:
  app:
    controller: jellyfin
    type: NodePort
    ports:
      http:
        port: 8096

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    hosts:
      - host: jellyfin.snekxs.xyz
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - hosts:
          - jellyfin.snekxs.xyz
        secretName: jellyfin-tls

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: local-path
    globalMounts:
      - path: /config
  media:
    type: hostPath
    hostPath: /mnt/hdd/media
    hostPathType: DirectoryOrCreate
    globalMounts:
      - path: /media
  transcode:
    type: hostPath
    hostPath: /mnt/ssd/jellyfin/transcode
    hostPathType: DirectoryOrCreate
    globalMounts:
      - path: /config/transcodes
