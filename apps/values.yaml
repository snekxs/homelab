controllers:
  trackarr:
    containers:
      app:
        image:
          repository: ghcr.io/florianjs/trackarr
          tag: latest
        env:
          DATABASE_URL: "postgresql://trackarr:trackarr@localhost:5432/trackarr"
          REDIS_URL: "redis://:trackarr@localhost:6379"
          NUXT_PUBLIC_SITE_URL: "https://tracker.snekxs.xyz"
          NODE_ENV: "production"
          NUXT_SECRET:
            valueFrom:
              secretKeyRef:
                name: trackarr-secret
                key: NUXT_SECRET
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

  postgres:
    containers:
      app:
        image:
          repository: postgres
          tag: "16"
        env:
          POSTGRES_USER: "trackarr"
          POSTGRES_PASSWORD: "trackarr"
          POSTGRES_DB: "trackarr"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

  redis:
    containers:
      app:
        image:
          repository: redis
          tag: "7"
        args:
          - redis-server
          - --requirepass
          - trackarr
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

service:
  app:
    controller: trackarr
    type: NodePort
    ports:
      http:
        port: 3000
  postgres:
    controller: postgres
    ports:
      postgresql:
        port: 5432
  redis:
    controller: redis
    ports:
      redis:
        port: 6379

ingress:
  app:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    hosts:
      - host: tracker.snekxs.xyz
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - hosts:
          - tracker.snekxs.xyz
        secretName: trackarr-tls

persistence:
  pgdata:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: local-path
    advancedMounts:
      postgres:
        app:
          - path: /var/lib/postgresql/data
  redisdata:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: local-path
    advancedMounts:
      redis:
        app:
          - path: /data
