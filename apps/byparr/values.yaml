controllers:
  byparr:
    containers:
      app:
        image:
          repository: ghcr.io/thephaseless/byparr
          tag: latest
        env:
          LOG_LEVEL: "INFO"
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi

service:
  app:
    controller: byparr
    ports:
      http:
        port: 8191
